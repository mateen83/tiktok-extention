<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Video Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-brand">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>TikTok Downloader</h1>
          <span class="version">v1.0.0</span>
        </div>
      </div>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Disclaimer Banner -->
    <div class="disclaimer-banner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Only downloads permitted, publicly accessible videos.</span>
    </div>

    <!-- Status Section -->
    <section id="section-status" class="section">
      <div class="status-grid">
        <div class="status-card" id="status-state">
          <div class="status-label">Status</div>
          <div class="status-value" id="queue-state">Idle</div>
        </div>
        <div class="status-card">
          <div class="status-label">Progress</div>
          <div class="status-value" id="queue-progress">0 / 0</div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-details">
          <span id="progress-percent">0%</span>
          <span id="progress-counts"></span>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-row" id="stats-row" style="display: none;">
        <div class="stat">
          <span class="stat-dot stat-dot-pending"></span>
          <span>Pending: <strong id="stat-pending">0</strong></span>
        </div>
        <div class="stat">
          <span class="stat-dot stat-dot-active"></span>
          <span>Active: <strong id="stat-active">0</strong></span>
        </div>
        <div class="stat">
          <span class="stat-dot stat-dot-done"></span>
          <span>Done: <strong id="stat-done">0</strong></span>
        </div>
        <div class="stat">
          <span class="stat-dot stat-dot-fail"></span>
          <span>Failed: <strong id="stat-failed">0</strong></span>
        </div>
      </div>
    </section>

    <!-- Controls Section -->
    <section id="section-controls" class="section">
      <div class="controls-row" style="flex-wrap: wrap;">
        <button id="btn-scan" class="btn btn-primary" style="flex: 1; justify-content: center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span id="txt-scan">Scan Page</span>
        </button>
        <button id="btn-download-all" class="btn" style="display: none; flex: 1; justify-content: center; background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; box-shadow: 0 2px 8px rgba(34, 197, 94, 0.2);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span id="txt-download-all">Download All</span>
        </button>
        <button id="btn-pause" class="btn btn-secondary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
          Pause
        </button>
        <button id="btn-resume" class="btn btn-secondary" disabled style="display: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
      </div>
      <div class="controls-row">
        <button id="btn-cancel" class="btn btn-danger" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Cancel
        </button>
        <button id="btn-retry" class="btn btn-secondary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Retry Failed
        </button>
        <button id="btn-export-log" class="btn btn-ghost">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export Log
        </button>
      </div>
    </section>

    <!-- Video List (Lazy Loaded) -->
    <section id="section-videos" class="section" style="display: none;">
      <div class="section-header">
        <h2>Found Videos</h2>
        <div style="display: flex; gap: 8px; align-items: center;">
          <span class="badge" id="video-count">0</span>
          <button id="btn-clear-history" class="icon-btn" title="Clear History" style="width: 24px; height: 24px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="video-list" class="video-list"></div>
      <button id="btn-load-more" class="btn btn-ghost btn-full" style="display: none;">Load More</button>
    </section>

    <!-- Empty State -->
    <section id="section-empty" class="section empty-state">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 6V2"/><circle cx="12" cy="12" r="2"/>
        </svg>
      </div>
      <p>Navigate to a TikTok page and click <strong>Scan Page</strong> to find downloadable videos.</p>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Made with care • Respects your privacy</span>
    </footer>
  </div>

  <script src="../lib/constants.js"></script>
  <script src="../lib/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
